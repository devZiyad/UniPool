spring.application.name=UniPool

# Database Configuration
spring.datasource.url=jdbc:h2:file:./data/unipool
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson Configuration (UTC timezone policy)
spring.jackson.time-zone=UTC

# JWT Configuration
jwt.secret=y9OkM2UnHNKLK0pc4HuQ/BuxOsCxliwstKvJxJAh5d4=
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=*

# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=1024

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Logging
logging.level.me.devziyad.springbootbackend=INFO
logging.level.org.springframework.security=DEBUG

# Payment Configuration
payment.platform-fee-percentage=10

# GPS Tracking Configuration
gps.tracking.update-interval-seconds=30

# Geocoding Configuration
geocoding.country-codes=BH

# Cache Configuration
spring.cache.type=simple
spring.cache.cache-names=reverseGeocode

# Rate Limiting Configuration
rate.limiting.enabled=true

# Application Version (should match pom.xml version)
app.version=0.0.1-SNAPSHOT

# Admin Account Configuration
# Admin credentials must be provided via environment variables or .env file
# See .env.template for required variables